name: "WINDOWS DOCKURR (WARP + MMO BANDWIDTH APPS)"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-rdp:
    name: "Windows MMO Node"
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      WINDOWS_USERNAME: "user"
      WINDOWS_PASSWORD: "ngoc0102@"

    steps:
      - name: Prepare workspace and OEM scripts
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update > /dev/null 2>&1
          sudo mkdir -p /mnt/windows_data
          sudo chmod 777 /mnt/windows_data
          mkdir -p oem

          # === SCRIPT CÀI WARP & 6 APP BĂNG THÔNG NGẦM ===
          cat > oem/setup-apps.ps1 <<'POWERSHELL'
          $ErrorActionPreference = 'SilentlyContinue'
          
          # 1. CÀI ĐẶT VÀ BẬT WARP 1.1.1.1
          Invoke-WebRequest -Uri "https://1111-releases.cloudflareclient.com/windows/Cloudflare_WARP_Release-amd64.msi" -OutFile "C:\warp.msi" -UseBasicParsing
          Start-Process msiexec.exe -ArgumentList "/i C:\warp.msi /qn" -Wait
          Start-Sleep 15
          & "C:\Program Files\Cloudflare\Cloudflare WARP\warp-cli.exe" --accept-tos registration new
          Start-Sleep 5
          & "C:\Program Files\Cloudflare\Cloudflare WARP\warp-cli.exe" --accept-tos mode warp
          Start-Sleep 2
          & "C:\Program Files\Cloudflare\Cloudflare WARP\warp-cli.exe" --accept-tos connect

          # 2. TẢI VÀ CÀI ĐẶT SILENT 6 KÈO SHARE BĂNG THÔNG
          $apps = @(
              @{ Name="Honeygain"; Url="https://download.honeygain.com/windows-app/Honeygain_install.exe"; Args="/S" },
              @{ Name="Traffmonetizer"; Url="https://data.traffmonetizer.com/downloads/Installer.exe"; Args="/S" },
              @{ Name="PawnsApp"; Url="https://download.pawns.app/windows/pawnsapp-windows.exe"; Args="/S" },
              @{ Name="PacketStream"; Url="https://packetstream.io/psclient_windows_x64.exe"; Args="/S" },
              @{ Name="EarnApp"; Url="https://brightdata.com/static/earnapp/Install_EarnApp.exe"; Args="/q" },
              @{ Name="EarnFM"; Url="https://earn.fm/download/windows"; Args="/S" }
          )

          foreach ($app in $apps) {
              $exePath = "C:\$($app.Name).exe"
              Invoke-WebRequest -Uri $app.Url -OutFile $exePath -UseBasicParsing
              if (Test-Path $exePath) {
                  Start-Process $exePath -ArgumentList $app.Args -Wait
              }
          }
          POWERSHELL

          cat > oem/install.bat <<'BAT'
          @echo off
          echo Dang cai dat WARP 1.1.1.1 va Dan 6 App Share Bang Thong...
          powershell -NoProfile -ExecutionPolicy Bypass -File "C:\oem\setup-apps.ps1"
          echo Setup hoan tat, chuan bi khoi dong lai!
          shutdown /r /t 10
          BAT

      - name: Generate docker-compose
        shell: bash
        run: |
          cat > docker-compose.yml <<EOF
          version: "3.9"
          services:
            windows:
              image: dockurr/windows
              container_name: windows_rdp
              privileged: true
              environment:
                VERSION: "10"
                USERNAME: "${WINDOWS_USERNAME}"
                PASSWORD: "${WINDOWS_PASSWORD}"
                RAM_SIZE: "8G"
                CPU_CORES: "4"
                DISK_SIZE: "64G"
              devices:
                - /dev/kvm
              ports:
                - "3389:3389"
                - "8006:8006"
              volumes:
                - /mnt/windows_data:/storage
                - ./oem:/oem
          EOF

      - name: Boot Windows
        shell: bash
        run: |
          set -Eeuo pipefail
          docker compose up -d > /dev/null 2>&1

      - name: Start tunnels
        shell: bash
        run: |
          set -Eeuo pipefail
          wget -q https://github.com/kami2k1/tunnel/releases/latest/download/kami-tunnel-linux-amd64.tar.gz
          tar -xzf kami-tunnel-linux-amd64.tar.gz > /dev/null 2>&1
          chmod +x kami-tunnel
          
          mkdir -p tunnel_rdp tunnel_web
          cp kami-tunnel tunnel_rdp/
          cp kami-tunnel tunnel_web/
          
          cd tunnel_rdp
          nohup ./kami-tunnel 3389 > rdp.log 2>&1 &
          
          cd ../tunnel_web
          nohup ./kami-tunnel 8006 > web.log 2>&1 &

      - name: Print connection info
        shell: bash
        run: |
          set -Eeuo pipefail

          RDP_IP=""
          RDP_RETRY=0
          while [ -z "$RDP_IP" ] && [ $RDP_RETRY -lt 60 ]; do
            if [ -f tunnel_rdp/kami_tunnel.txt ]; then
              RDP_CONTENT=$(head -1 tunnel_rdp/kami_tunnel.txt 2>/dev/null || true)
              if [[ "${RDP_CONTENT:-}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+$ ]]; then
                RDP_IP="$RDP_CONTENT"
                break
              fi
            fi
            sleep 2
            RDP_RETRY=$((RDP_RETRY + 1))
          done

          WEB_IP=""
          WEB_RETRY=0
          while [ -z "$WEB_IP" ] && [ $WEB_RETRY -lt 60 ]; do
            if [ -f tunnel_web/kami_tunnel.txt ]; then
              WEB_CONTENT=$(head -1 tunnel_web/kami_tunnel.txt 2>/dev/null || true)
              if [[ "${WEB_CONTENT:-}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+$ ]]; then
                WEB_IP="$WEB_CONTENT"
                break
              fi
            fi
            sleep 2
            WEB_RETRY=$((WEB_RETRY + 1))
          done

          echo "====================================================="
          echo "🔥 BẢN TỔNG LỰC - WARP + 6 KÈO BĂNG THÔNG 🔥"
          echo "🖥️ DÙNG CHO APP RDP  : ${RDP_IP}"
          echo "🌐 DÙNG CHO WEB      : http://${WEB_IP}"
          echo "👤 USERNAME         : ${WINDOWS_USERNAME}"
          echo "🔑 PASSWORD         : ${WINDOWS_PASSWORD}"
          echo "====================================================="

      - name: Keep runner alive
        shell: bash
        run: |
          for i in {1..72}; do
            echo "May chu van song ($((i * 5)) phut / 360 phut)"
            sleep 300
          done
