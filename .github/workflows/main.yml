name: "WINDOWS MMO (PORTABLE TRAFFMONETIZER + RDP)"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-rdp:
    name: "Traffmonetizer Windows Node"
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      WINDOWS_USERNAME: "user"
      WINDOWS_PASSWORD: "ngoc0102@"

    steps:
      - name: Prepare workspace and OEM scripts
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update > /dev/null 2>&1
          sudo mkdir -p /mnt/windows_data
          sudo chmod 777 /mnt/windows_data
          mkdir -p oem

          # === SCRIPT TẢI APP VÀ TẠO BOT GÕ PHÍM ===
          cat > oem/setup-system.ps1 <<'POWERSHELL'
          $ErrorActionPreference = 'SilentlyContinue'
          
          # Tải thẳng ổ C
          Invoke-WebRequest -Uri "https://data.traffmonetizer.com/downloads/Traffmonetizer.exe" -OutFile "C:\Traffmonetizer.exe" -UseBasicParsing
          
          # TẠO CON MA GÕ PHÍM BÁ ĐẠO (CÓ BẤM TAB CHUYỂN Ô)
          $ps1 = @(
              'Add-Type -AssemblyName Microsoft.VisualBasic',
              'Add-Type -AssemblyName System.Windows.Forms',
              'Start-Sleep -Seconds 10 # Cho App bung ra han',
              '$proc = Get-Process -Name "Traffmonetizer" -ErrorAction SilentlyContinue | Select-Object -First 1',
              'if ($proc) {',
              '    [Microsoft.VisualBasic.Interaction]::AppActivate($proc.Id)',
              '    Start-Sleep -Seconds 2',
              '    [System.Windows.Forms.SendKeys]::SendWait("{TAB}") # BAM TAB DE CHUYEN CON TRO VAO O NHAP TOKEN',
              '    Start-Sleep -Milliseconds 500',
              '    [System.Windows.Forms.SendKeys]::SendWait("6HN0okse0Lcd2aIrgEB2ZY6hIsEIhl1QepxAh78{+}PLA=")',
              '    Start-Sleep -Milliseconds 500',
              '    [System.Windows.Forms.SendKeys]::SendWait("{ENTER}")',
              '}',
              'Remove-Item -Path $MyInvocation.MyCommand.Path -Force'
          ) -join [Environment]::NewLine
          Set-Content -Path "C:\bot_gophim.ps1" -Value $ps1 -Encoding UTF8

          # ĐẶT BẪY KHỞI ĐỘNG
          $startupDir = "$env:ProgramData\Microsoft\Windows\Start Menu\Programs\StartUp"
          $cmd = @(
              '@echo off'
              'start "" "C:\Traffmonetizer.exe"'
              'powershell -WindowStyle Hidden -ExecutionPolicy Bypass -File "C:\bot_gophim.ps1"'
              'del "%~f0"'
          ) -join [Environment]::NewLine
          Set-Content -Path "$startupDir\boot_app.cmd" -Value $cmd -Encoding ASCII
          POWERSHELL

          cat > oem/install.bat <<'BAT'
          @echo off
          powershell -WindowStyle Hidden -NoProfile -ExecutionPolicy Bypass -File "C:\oem\setup-system.ps1"
          BAT

      - name: Generate docker-compose
        shell: bash
        run: |
          cat > docker-compose.yml <<EOF
          version: "3.9"
          services:
            windows:
              image: dockurr/windows
              container_name: windows_rdp
              privileged: true
              environment:
                VERSION: "10"
                USERNAME: "${WINDOWS_USERNAME}"
                PASSWORD: "${WINDOWS_PASSWORD}"
                RAM_SIZE: "4G"
                CPU_CORES: "4"
                DISK_SIZE: "64G"
                AUTO_LOGIN: "true" 
              devices:
                - /dev/kvm
              ports:
                - "3389:3389"
                - "8006:8006"
              volumes:
                - /mnt/windows_data:/storage
                - ./oem:/oem
          EOF

      - name: Boot Windows
        shell: bash
        run: |
          docker compose up -d > /dev/null 2>&1

      - name: Start tunnels
        shell: bash
        run: |
          wget -q https://github.com/kami2k1/tunnel/releases/latest/download/kami-tunnel-linux-amd64.tar.gz
          tar -xzf kami-tunnel-linux-amd64.tar.gz > /dev/null 2>&1
          chmod +x kami-tunnel
          mkdir -p tunnel_rdp tunnel_web
          cp kami-tunnel tunnel_rdp/
          cp kami-tunnel tunnel_web/
          cd tunnel_rdp
          nohup ./kami-tunnel 3389 > rdp.log 2>&1 &
          cd ../tunnel_web
          nohup ./kami-tunnel 8006 > web.log 2>&1 &

      - name: Print connection info
        shell: bash
        run: |
          RDP_IP=""
          while [ -z "$RDP_IP" ]; do
            RDP_CONTENT=$(head -1 tunnel_rdp/kami_tunnel.txt 2>/dev/null || true)
            if [[ "${RDP_CONTENT:-}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+$ ]]; then RDP_IP="$RDP_CONTENT"; break; fi
            sleep 2
          done
          WEB_IP=""
          while [ -z "$WEB_IP" ]; do
            WEB_CONTENT=$(head -1 tunnel_web/kami_tunnel.txt 2>/dev/null || true)
            if [[ "${WEB_CONTENT:-}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+$ ]]; then WEB_IP="$WEB_CONTENT"; break; fi
            sleep 2
          done
          echo "====================================================="
          echo "🔥 AUTO BOT: ĐÃ FIX LỖI CON TRỎ CHUỘT 🔥"
          echo "🖥️ DÙNG CHO APP RDP  : ${RDP_IP}"
          echo "🌐 DÙNG CHO WEB      : http://${WEB_IP}"
          echo "====================================================="

      - name: Keep runner alive
        shell: bash
        run: |
          for i in {1..72}; do echo "May chu van song... AUTO BOT DANG CAY TIEN..."; sleep 300; done
