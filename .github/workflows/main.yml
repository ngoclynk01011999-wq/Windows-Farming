name: "WINDOWS MMO (AUTO TRAFFMONETIZER + WARP)"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-rdp:
    name: "Traffmonetizer Auto Node"
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      WINDOWS_USERNAME: "user"
      WINDOWS_PASSWORD: "ngoc0102@"

    steps:
      - name: Prepare workspace and OEM scripts
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update > /dev/null 2>&1
          sudo mkdir -p /mnt/windows_data
          sudo chmod 777 /mnt/windows_data
          mkdir -p oem qemu-wrapper

          # 1. Fake Nhẹ Phần Cứng (Giấu QEMU)
          HW_PROFILES=(
            "Intel(R) Core(TM) i5-12500 @ 3.00GHz|Dell Inc.|OptiPlex 7000 Tower|Dell Inc.|1.9.1|08/29/2023"
            "Intel(R) Core(TM) i7-12700H @ 2.30GHz|ASUSTeK COMPUTER INC.|TUF Gaming F15 FX507ZM|American Megatrends International, LLC.|315|09/14/2022"
          )
          SELECTED_PROFILE=$(shuf -e "${HW_PROFILES[@]}" -n 1)
          IFS='|' read -r SELECTED_CPU OEM_MANU OEM_PROD BIOS_VENDOR BIOS_VER BIOS_DATE <<< "$SELECTED_PROFILE"

          {
            echo "SELECTED_CPU=${SELECTED_CPU}"
            echo "OEM_MANU=${OEM_MANU}"
            echo "OEM_PROD=${OEM_PROD}"
            echo "BIOS_VENDOR=${BIOS_VENDOR}"
            echo "BIOS_VER=${BIOS_VER}"
            echo "BIOS_DATE=${BIOS_DATE}"
          } >> "$GITHUB_ENV"

      - name: Generate custom QEMU launcher
        shell: bash
        run: |
          cat > qemu-wrapper/qemu-system-x86_64 <<EOF
          #!/usr/bin/env bash
          set -Eeuo pipefail
          filtered_args=()
          skip_next=0
          for arg in "\$@"; do
            if [[ "\$skip_next" -eq 1 ]]; then
              skip_next=0
              continue
            fi
            if [[ "\$arg" == "-smbios" || "\$arg" == "-cpu" ]]; then
              skip_next=1
              continue
            fi
            filtered_args+=("\$arg")
          done
          exec /usr/bin/qemu-system-x86_64 \\
            "\${filtered_args[@]}" \\
            -smbios "type=0,vendor=${BIOS_VENDOR},version=${BIOS_VER},date=${BIOS_DATE}" \\
            -smbios "type=1,manufacturer=${OEM_MANU},product=${OEM_PROD}" \\
            -cpu "qemu64,model_id=${SELECTED_CPU}"
          EOF
          chmod +x qemu-wrapper/qemu-system-x86_64

      - name: SCRIPT NHÚNG SÂU (AUTO CÀI & AUTO NHẬP TOKEN)
        shell: bash
        run: |
          cat > oem/setup-system.ps1 <<'POWERSHELL'
          $ErrorActionPreference = 'SilentlyContinue'
          $ProgressPreference = 'SilentlyContinue'
          
          # TẢI WARP VÀ TRAFFMONETIZER
          Invoke-WebRequest -Uri "https://1111-releases.cloudflareclient.com/windows/Cloudflare_WARP_Release-amd64.msi" -OutFile "C:\warp.msi" -UseBasicParsing
          Invoke-WebRequest -Uri "https://data.traffmonetizer.com/downloads/Installer.exe" -OutFile "C:\traff.exe" -UseBasicParsing
          
          # CÀI ĐẶT TRAFFMONETIZER NGẦM
          Start-Process "C:\traff.exe" -ArgumentList "/S" -Wait
          
          # CÀI ĐẶT WARP VÀ ÉP CONNECT NGAY TRONG LÚC CÀI WIN
          Start-Process msiexec.exe -ArgumentList "/i C:\warp.msi /qn" -WindowStyle Hidden -Wait
          Start-Sleep 5
          & "C:\Program Files\Cloudflare\Cloudflare WARP\warp-cli.exe" --accept-tos registration new | Out-Null
          Start-Sleep 2
          & "C:\Program Files\Cloudflare\Cloudflare WARP\warp-cli.exe" --accept-tos mode warp | Out-Null
          Start-Sleep 2
          & "C:\Program Files\Cloudflare\Cloudflare WARP\warp-cli.exe" --accept-tos connect | Out-Null

          # ĐẶT BẪY KHỞI ĐỘNG AUTO CHẠY APP KÈM TOKEN CHO TÀI KHOẢN
          $startupDir = "$env:ProgramData\Microsoft\Windows\Start Menu\Programs\StartUp"
          $cmd = @(
              '@echo off'
              'timeout /t 5 /nobreak >nul'
              ':: Bat WARP thu nho'
              'start /min "" "C:\Program Files\Cloudflare\Cloudflare WARP\Cloudflare WARP.exe"'
              'timeout /t 5 /nobreak >nul'
              ':: Truyen Token thang vao Traffmonetizer va cho chay ngam'
              'set TOKEN=6HN0okse0Lcd2aIrgEB2ZY6hIsEIhl1QepxAh78+PLA='
              'if exist "C:\Program Files\Traffmonetizer\Traffmonetizer.exe" start /min "" "C:\Program Files\Traffmonetizer\Traffmonetizer.exe" --token %TOKEN% --accept-tos'
              'if exist "C:\Program Files (x86)\Traffmonetizer\Traffmonetizer.exe" start /min "" "C:\Program Files (x86)\Traffmonetizer\Traffmonetizer.exe" --token %TOKEN% --accept-tos'
          ) -join [Environment]::NewLine
          Set-Content -Path "$startupDir\auto-bot.cmd" -Value $cmd -Encoding ASCII

          # Dọn dẹp ổ C
          Remove-Item -Path "C:\warp.msi" -Force
          Remove-Item -Path "C:\traff.exe" -Force
          POWERSHELL

          cat > oem/install.bat <<'BAT'
          @echo off
          powershell -WindowStyle Hidden -NoProfile -ExecutionPolicy Bypass -File "C:\oem\setup-system.ps1"
          shutdown /r /t 10
          BAT

      - name: Generate docker-compose
        shell: bash
        run: |
          cat > docker-compose.yml <<EOF
          version: "3.9"
          services:
            windows:
              image: dockurr/windows
              container_name: windows_rdp
              privileged: true
              environment:
                VERSION: "10"
                USERNAME: "${WINDOWS_USERNAME}"
                PASSWORD: "${WINDOWS_PASSWORD}"
                RAM_SIZE: "8G"
                CPU_CORES: "4"
                DISK_SIZE: "64G"
                # AUTO LOGIN BANG TAI KHOAN WINDOWS DE KICH HOAT SCRIPT STARTUP
                AUTO_LOGIN: "true" 
              devices:
                - /dev/kvm
              ports:
                - "3389:3389"
                - "8006:8006"
              volumes:
                - /mnt/windows_data:/storage
                - ./oem:/oem
                - ./qemu-wrapper/qemu-system-x86_64:/usr/local/bin/qemu-system-x86_64
          EOF

      - name: Boot Windows
        shell: bash
        run: |
          set -Eeuo pipefail
          docker compose up -d > /dev/null 2>&1

      - name: Start tunnels
        shell: bash
        run: |
          set -Eeuo pipefail
          wget -q https://github.com/kami2k1/tunnel/releases/latest/download/kami-tunnel-linux-amd64.tar.gz
          tar -xzf kami-tunnel-linux-amd64.tar.gz > /dev/null 2>&1
          chmod +x kami-tunnel
          
          mkdir -p tunnel_rdp tunnel_web
          cp kami-tunnel tunnel_rdp/
          cp kami-tunnel tunnel_web/
          
          cd tunnel_rdp
          nohup ./kami-tunnel 3389 > rdp.log 2>&1 &
          
          cd ../tunnel_web
          nohup ./kami-tunnel 8006 > web.log 2>&1 &

      - name: Print connection info
        shell: bash
        run: |
          set -Eeuo pipefail

          RDP_IP=""
          RDP_RETRY=0
          while [ -z "$RDP_IP" ] && [ $RDP_RETRY -lt 60 ]; do
            if [ -f tunnel_rdp/kami_tunnel.txt ]; then
              RDP_CONTENT=$(head -1 tunnel_rdp/kami_tunnel.txt 2>/dev/null || true)
              if [[ "${RDP_CONTENT:-}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+$ ]]; then
                RDP_IP="$RDP_CONTENT"
                break
              fi
            fi
            sleep 2
            RDP_RETRY=$((RDP_RETRY + 1))
          done

          WEB_IP=""
          WEB_RETRY=0
          while [ -z "$WEB_IP" ] && [ $WEB_RETRY -lt 60 ]; do
            if [ -f tunnel_web/kami_tunnel.txt ]; then
              WEB_CONTENT=$(head -1 tunnel_web/kami_tunnel.txt 2>/dev/null || true)
              if [[ "${WEB_CONTENT:-}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+$ ]]; then
                WEB_IP="$WEB_CONTENT"
                break
              fi
            fi
            sleep 2
            WEB_RETRY=$((WEB_RETRY + 1))
          done

          echo "====================================================="
          echo "🔥 AUTO BOT: TRAFFMONETIZER + WARP 1.1.1.1 🔥"
          echo "🖥️ DÙNG CHO APP RDP  : ${RDP_IP}"
          echo "🌐 DÙNG CHO WEB      : http://${WEB_IP}"
          echo "👤 USERNAME         : ${WINDOWS_USERNAME}"
          echo "🔑 PASSWORD         : ${WINDOWS_PASSWORD}"
          echo "⚠️ TRẠNG THÁI        : Đang auto chạy ngầm cày tiền!"
          echo "====================================================="

      - name: Keep runner alive
        shell: bash
        run: |
          for i in {1..72}; do
            echo "May chu van song ($((i * 5)) phut / 360 phut)"
            sleep 300
          done
