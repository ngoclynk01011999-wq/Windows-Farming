name: "WINDOWS MMO (THE FINAL BOSS - TRAFFMONETIZER)"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-rdp:
    name: "Traffmonetizer Master Node"
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      WINDOWS_USERNAME: "user"
      WINDOWS_PASSWORD: "ngoc0102@"

    steps:
      - name: Prepare workspace and OEM scripts
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo mkdir -p /mnt/windows_data
          sudo chmod 777 /mnt/windows_data
          mkdir -p oem

          # === SCRIPT BƠM DNA CHUẨN XÁC VÀO ROAMING ===
          cat > oem/setup-system.ps1 <<'POWERSHELL'
          $ErrorActionPreference = 'SilentlyContinue'
          
          # Tải App siêu nhẹ đéo xài WARP
          Invoke-WebRequest -Uri "https://data.traffmonetizer.com/downloads/Traffmonetizer.exe" -OutFile "C:\Traffmonetizer.exe" -UseBasicParsing
          
          # Tạo Bot mớm Token
          $ps1 = @(
              'Start-Sleep -Seconds 3',
              '$tmDir = "$env:APPDATA\traffmonetizer"',
              'if (-not (Test-Path $tmDir)) { New-Item -ItemType Directory -Path $tmDir -Force | Out-Null }',
              '# Nhet Token ma hoa \u002B vao',
              '$jsonStr = "{`"Token`":`"6HN0okse0Lcd2aIrgEB2ZY6hIsEIhl1QepxAh78\u002BPLA=`",`"StartWithWindows`":true,`"Accepting`":true}"',
              '[System.IO.File]::WriteAllText("$tmDir\settings.json", $jsonStr)',
              'Start-Sleep -Seconds 1',
              'Start-Process "C:\Traffmonetizer.exe"',
              'Remove-Item -Path $MyInvocation.MyCommand.Path -Force'
          ) -join [Environment]::NewLine
          Set-Content -Path "C:\boot_traff.ps1" -Value $ps1 -Encoding UTF8

          # Đặt bẫy tự kích hoạt
          $startupDir = "$env:ProgramData\Microsoft\Windows\Start Menu\Programs\StartUp"
          $cmd = @(
              '@echo off',
              'powershell -WindowStyle Hidden -ExecutionPolicy Bypass -File "C:\boot_traff.ps1"',
              'del "%~f0"'
          ) -join [Environment]::NewLine
          Set-Content -Path "$startupDir\boot_traff.cmd" -Value $cmd -Encoding ASCII
          POWERSHELL

          cat > oem/install.bat <<'BAT'
          @echo off
          powershell -WindowStyle Hidden -NoProfile -ExecutionPolicy Bypass -File "C:\oem\setup-system.ps1"
          BAT

      - name: Generate docker-compose
        shell: bash
        run: |
          cat > docker-compose.yml <<EOF
          version: "3.9"
          services:
            windows:
              image: dockurr/windows
              container_name: windows_rdp
              privileged: true
              environment:
                VERSION: "10"
                USERNAME: "${WINDOWS_USERNAME}"
                PASSWORD: "${WINDOWS_PASSWORD}"
                RAM_SIZE: "4G"
                CPU_CORES: "4"
                DISK_SIZE: "64G"
                AUTO_LOGIN: "true" 
              ports:
                - "3389:3389"
                - "8006:8006"
              volumes:
                - /mnt/windows_data:/storage
                - ./oem:/oem
          EOF
          
          # DÒ RADAR: NẾU GITHUB CHO PHÉP KVM THÌ MỚI BẬT ĐỂ ĐỠ BỊ VĂNG LỖI!
          if [ -e /dev/kvm ]; then
            sed -i '/ports:/i \    devices:\n      - /dev/kvm' docker-compose.yml
            echo "✅ Đã tìm thấy KVM, máy ảo sẽ chạy max speed!"
          else
            echo "⚠️ Github không cấp KVM, máy ảo chạy chậm hơn 1 chút nhưng KHÔNG BỊ LỖI!"
          fi

      - name: Boot Windows
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "Đang kéo bản cài đặt Windows về..."
          docker pull dockurr/windows:latest
          echo "Đang kích hoạt máy ảo..."
          docker compose up -d
          # HIỆN RÕ NHẬT KÝ ĐỂ THEO DÕI NẾU CÓ BIẾN
          docker logs windows_rdp --tail 20

      - name: Start tunnels
        shell: bash
        run: |
          wget -q https://github.com/kami2k1/tunnel/releases/latest/download/kami-tunnel-linux-amd64.tar.gz
          tar -xzf kami-tunnel-linux-amd64.tar.gz > /dev/null 2>&1
          chmod +x kami-tunnel
          mkdir -p tunnel_rdp tunnel_web
          cp kami-tunnel tunnel_rdp/
          cp kami-tunnel tunnel_web/
          cd tunnel_rdp
          nohup ./kami-tunnel 3389 > rdp.log 2>&1 &
          cd ../tunnel_web
          nohup ./kami-tunnel 8006 > web.log 2>&1 &

      - name: Print connection info
        shell: bash
        run: |
          RDP_IP=""
          while [ -z "$RDP_IP" ]; do
            RDP_CONTENT=$(head -1 tunnel_rdp/kami_tunnel.txt 2>/dev/null || true)
            if [[ "${RDP_CONTENT:-}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+$ ]]; then RDP_IP="$RDP_CONTENT"; break; fi
            sleep 2
          done
          WEB_IP=""
          while [ -z "$WEB_IP" ]; do
            WEB_CONTENT=$(head -1 tunnel_web/kami_tunnel.txt 2>/dev/null || true)
            if [[ "${WEB_CONTENT:-}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+$ ]]; then WEB_IP="$WEB_CONTENT"; break; fi
            sleep 2
          done
          echo "====================================================="
          echo "🔥 AUTO BOT: BẤT TỬ - ĐÃ FIX MỌI LỖI TỪ GITHUB 🔥"
          echo "🖥️ DÙNG CHO APP RDP  : ${RDP_IP}"
          echo "🌐 DÙNG CHO WEB      : http://${WEB_IP}"
          echo "====================================================="

      - name: Keep runner alive
        shell: bash
        run: |
          for i in {1..72}; do echo "May chu van song... AUTO BOT DANG CAY TIEN..."; sleep 300; done
